spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:discodeit;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
      properties:
        hibernate:
          use_sql_comments: true
          format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.sprint.mission.discodeit: debug
    org.springframework.web: trace
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

    # SQL 로그 보기 위해 설정했던 레벨 유지 (dev 환경)
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace